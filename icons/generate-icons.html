<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SafeSpace Icon Generator</title>
  <style>
    body { background: #0a0f0a; color: #e6e6e6; font-family: 'Courier New', monospace; padding: 32px; }
    h1 { color: #00b347; font-size: 18px; margin-bottom: 24px; }
    .grid { display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 24px; }
    .item { text-align: center; }
    .item canvas { display: block; border: 1px solid #1a2420; }
    .item p { margin-top: 6px; font-size: 11px; color: #737373; }
    button {
      padding: 8px 20px; background: #00b347; color: #0a0f0a;
      border: none; font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; border-radius: 2px; margin-right: 8px; margin-bottom: 8px;
    }
    button:hover { background: #00d455; }
    .note { font-size: 11px; color: #737373; margin-top: 16px; line-height: 1.6; }
    .note code { color: #00b347; }
  </style>
</head>
<body>
  <h1>[SafeSpace] Icon Generator</h1>
  <p style="font-size:12px;color:#737373;margin-bottom:20px;">
    Open this file in Chrome, click "Download All Icons", then save the 4 PNG files into the icons/ folder.
  </p>

  <div class="grid" id="previews"></div>
  <button onclick="downloadAll()">&#x2193; Download All Icons</button>

  <div class="note">
    Place all 4 PNG files in the <code>icons/</code> folder, then reload the extension at <code>chrome://extensions</code>.
  </div>

  <script>
    const SIZES = [16, 32, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width  = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const r = size * 0.18; // corner radius

      // ── Solid dark background with rounded corners ──
      roundRect(ctx, 0, 0, size, size, r);
      ctx.fillStyle = '#0d1117';
      ctx.fill();

      // ── Green filled shield shape ──
      const cx = size / 2;
      const shieldTop    = size * 0.12;
      const shieldBottom = size * 0.88;
      const shieldW      = size * 0.62;

      ctx.beginPath();
      // Top left → top right arc across top
      ctx.moveTo(cx - shieldW / 2, shieldTop + size * 0.12);
      ctx.lineTo(cx - shieldW / 2, shieldTop + size * 0.08);
      ctx.quadraticCurveTo(cx - shieldW / 2, shieldTop, cx - shieldW / 2 + size * 0.06, shieldTop);
      ctx.lineTo(cx + shieldW / 2 - size * 0.06, shieldTop);
      ctx.quadraticCurveTo(cx + shieldW / 2, shieldTop, cx + shieldW / 2, shieldTop + size * 0.08);
      ctx.lineTo(cx + shieldW / 2, shieldTop + size * 0.35);
      // Taper to point at bottom
      ctx.quadraticCurveTo(cx + shieldW / 2, shieldBottom - size * 0.1, cx, shieldBottom);
      ctx.quadraticCurveTo(cx - shieldW / 2, shieldBottom - size * 0.1, cx - shieldW / 2, shieldTop + size * 0.35);
      ctx.closePath();
      ctx.fillStyle = '#00b347';
      ctx.fill();

      // ── Checkmark inside shield (sizes >= 32) ──
      if (size >= 32) {
        const lw = Math.max(1.5, size * 0.07);
        ctx.strokeStyle = '#0d1117';
        ctx.lineWidth   = lw;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.beginPath();
        ctx.moveTo(cx - size * 0.14, cy(size, 0.5));
        ctx.lineTo(cx - size * 0.02, cy(size, 0.62));
        ctx.lineTo(cx + size * 0.16, cy(size, 0.38));
        ctx.stroke();
      }

      return canvas;
    }

    function cy(size, frac) { return size * frac; }

    // Helper: fill rounded rect path
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // Render previews
    const grid = document.getElementById('previews');
    SIZES.forEach(size => {
      const canvas = drawIcon(size);
      const item = document.createElement('div');
      item.className = 'item';
      item.appendChild(canvas);
      const label = document.createElement('p');
      label.textContent = `${size}x${size}`;
      item.appendChild(label);
      grid.appendChild(item);
    });

    function downloadAll() {
      SIZES.forEach(size => {
        const canvas = drawIcon(size);
        const a = document.createElement('a');
        a.download = `icon${size}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      });
    }
  </script>
</body>
</html>
